<svg viewBox="0 0 300 350" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-gold { fill: #D4AF37; }
      .logo-gold-stroke { stroke: #D4AF37; fill: none; }
      .logo-gold-text { fill: #D4AF37; font-family: 'Georgia', serif; font-weight: 600; }
      .logo-accent-light { stroke: #D4AF37; stroke-width: 0.8; opacity: 0.7; }
    </style>
  </defs>

  <!-- Decorative Top Crown -->
  <g class="logo-gold">
    <polygon points="150,65 145,75 155,75" class="logo-gold"/>
    <circle cx="130" cy="78" r="2.5" class="logo-gold"/>
    <circle cx="170" cy="78" r="2.5" class="logo-gold"/>
    <path d="M 140 70 L 160 70" class="logo-accent-light" stroke-linecap="round"/>
  </g>

  <!-- Left Decorative Wreath -->
  <g class="logo-gold-stroke" stroke-linecap="round">
    <!-- Upper left -->
    <path d="M 95 100 Q 75 90 70 105 Q 65 120 75 135" stroke-width="1.2"/>
    <path d="M 100 95 Q 80 85 75 100" stroke-width="1"/>
    <path d="M 105 110 Q 85 100 80 115" stroke-width="1"/>

    <!-- Leaves left -->
    <ellipse cx="82" cy="92" rx="2.5" ry="5" transform="rotate(-30 82 92)" class="logo-gold"/>
    <ellipse cx="76" cy="108" rx="2.5" ry="5" transform="rotate(20 76 108)" class="logo-gold"/>
    <ellipse cx="80" cy="128" rx="2.5" ry="5" transform="rotate(40 80 128)" class="logo-gold"/>
    <ellipse cx="95" cy="138" rx="2.5" ry="5" transform="rotate(60 95 138)" class="logo-gold"/>
  </g>

  <!-- Right Decorative Wreath -->
  <g class="logo-gold-stroke" stroke-linecap="round">
    <!-- Upper right -->
    <path d="M 205 100 Q 225 90 230 105 Q 235 120 225 135" stroke-width="1.2"/>
    <path d="M 200 95 Q 220 85 225 100" stroke-width="1"/>
    <path d="M 195 110 Q 215 100 220 115" stroke-width="1"/>

    <!-- Leaves right -->
    <ellipse cx="218" cy="92" rx="2.5" ry="5" transform="rotate(30 218 92)" class="logo-gold"/>
    <ellipse cx="224" cy="108" rx="2.5" ry="5" transform="rotate(-20 224 108)" class="logo-gold"/>
    <ellipse cx="220" cy="128" rx="2.5" ry="5" transform="rotate(-40 220 128)" class="logo-gold"/>
    <ellipse cx="205" cy="138" rx="2.5" ry="5" transform="rotate(-60 205 138)" class="logo-gold"/>
  </g>

  <!-- Outer Decorative Circle -->
  <circle cx="150" cy="130" r="85" class="logo-gold-stroke" stroke-width="1.5"/>
  <circle cx="150" cy="130" r="80" class="logo-gold-stroke" stroke-width="0.8" opacity="0.5"/>

  <!-- Center Letter A - Large and Bold -->
  <text x="150" y="160" font-size="85" text-anchor="middle" class="logo-gold-text" letter-spacing="2" font-style="italic" font-weight="700">A</text>

  <!-- Banner Ribbon -->
  <g>
    <!-- Ribbon shape -->
    <path d="M 110 175 L 120 172 L 180 172 L 190 175 L 185 185 L 115 185 Z" fill="none" stroke="#D4AF37" stroke-width="1.2"/>
    <path d="M 112 176 L 188 176" stroke="#D4AF37" stroke-width="0.8" opacity="0.5"/>

    <!-- Banner text -->
    <text x="150" y="182" font-size="11" text-anchor="middle" class="logo-gold-text" letter-spacing="1.5">HR MANAGEMENT</text>
  </g>

  <!-- Company Name -->
  <text x="150" y="215" font-size="18" text-anchor="middle" class="logo-gold-text" letter-spacing="3" font-weight="700">AMAN</text>

  <!-- Tagline -->
  <text x="150" y="240" font-size="10" text-anchor="middle" class="logo-gold" letter-spacing="2" opacity="0.85">PEOPLE • EXCELLENCE • GROWTH</text>

  <!-- Bottom Decorative Line -->
  <line x1="100" y1="250" x2="200" y2="250" class="logo-gold-stroke" stroke-width="0.8" opacity="0.6"/>

  <!-- Decorative dots -->
  <circle cx="115" cy="260" r="1.5" class="logo-gold" opacity="0.6"/>
  <circle cx="150" cy="265" r="1.5" class="logo-gold" opacity="0.6"/>
  <circle cx="185" cy="260" r="1.5" class="logo-gold" opacity="0.6"/>

  <!-- Year -->
  <text x="150" y="285" font-size="9" text-anchor="middle" class="logo-gold" opacity="0.7" letter-spacing="1">EST. 2024</text>

  <!-- Corner Flourishes -->
  <g class="logo-gold" opacity="0.4">
    <path d="M 115 95 L 120 100" class="logo-gold-stroke" stroke-width="0.6"/>
    <path d="M 185 95 L 180 100" class="logo-gold-stroke" stroke-width="0.6"/>
  </g>

  <!-- Welcome Text -->
  <text x="150" y="320" font-size="12" text-anchor="middle" class="logo-gold-text" letter-spacing="1.2">Welcome to AMAN HR Management</text>
  <text x="150" y="335" font-size="10" text-anchor="middle" class="logo-gold" letter-spacing="1" opacity="0.85">Manage your workforce efficiently with powerful tools...</text>
</svg>
